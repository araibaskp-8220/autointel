<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Car AI Assistant</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      background: url('https://images.unsplash.com/photo-1503376780353-7e6692767b70') no-repeat center center/cover;
      display: flex;
      flex-direction: column;
    }

    /* Dark overlay */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      top: 0;
      left: 0;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 1;
      padding: 20px 50px;
      font-size: 28px;
      font-weight: bold;
      color: white;
    }

    .hero {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
      flex-direction: column;
      padding: 20px;
    }

    .hero h1 {
      font-size: 60px;
      margin-bottom: 20px;
    }

    .hero p {
      font-size: 22px;
      margin-bottom: 30px;
      color: #ddd;
    }

    .btn {
      padding: 15px 30px;
      font-size: 18px;
      background: #0f62fe;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: white;
      transition: 0.3s;
    }

    .btn:hover {
      background: #0043ce;
    }

    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 15px;
      color: #ccc;
      background: rgba(0,0,0,0.5);
    }
  </style>
</head>

<body>

<header>
  🚗 Car AI Assistant
</header>

<div class="hero">
  <h1>Find Your Perfect Car</h1>
  <p>Compare vehicles, explore features, and get real-time insights instantly.</p>
  <button class="btn" onclick="alert('Use the chat icon on bottom right!')">
    Start Exploring
  </button>
</div>

<footer>
  Powered by IBM Watson Assistant
</footer>

<!-- Watson Assistant -->
<script>
  window.watsonAssistantChatOptions = {
    integrationID: "c8b73f5c-343e-46ab-924a-a2d87401dd0d",
    region: "au-syd",
    serviceInstanceID: "2ceaf244-5d6d-45e5-9264-de8718b01bfd",
    onLoad: async (instance) => {
      await instance.render();
    }
  };

  setTimeout(function () {
    const t = document.createElement('script');
    t.src = "https://web-chat.global.assistant.watson.appdomain.cloud/versions/latest/WatsonAssistantChatEntry.js";
    document.head.appendChild(t);
  });
</script>

</body>
</html>
